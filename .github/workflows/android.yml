name: Build Architect APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with Buildozer
        uses: ArtemSerebrennkov/buildozer-action@v1
        with:
          python-version: 3.11
          buildozer-version: master
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Architect-V12-Release
          path: bin/*.apk

name: Build Architect APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        uses: ArtemSerebrennkov/buildozer-action@v1
        with:
          python-version: 3.10
          buildozer-version: master
          # هذا السطر يمنع توقف البناء بسبب التحذيرات
          buildozer-flags: --verbose

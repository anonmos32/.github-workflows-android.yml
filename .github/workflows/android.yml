name: Build Architect APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with Buildozer
        uses: herve-pernot/buildozer-action@v0
        with:
          python-version: 3.10
          buildozer-version: master
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Architect-V12-Final
          path: bin/*.apk
